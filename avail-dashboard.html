<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVU OS — Agent Availability</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Nunito+Sans:wght@300;400;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #FFB703;
  --navy: #1C2945;
  --navy-text: #121A2B;
  --light-bg: #F1F3F9;
  --stroke: #D3DBEE;
  --success: #07D976;
  --success-bg: rgba(7,217,118,0.12);
  --offline: #E4E9F4;
  --offline-dark: #7B8DAD;
  --white: #fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--light-bg);
  font-family: 'Nunito Sans', sans-serif;
  color: var(--navy-text);
  min-height: 100vh;
}
header {
  background: var(--navy);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
}
.logo {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 19px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--primary);
}
header h1 {
  font-family: 'Nunito Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.01em;
}
.date-picker-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}
.date-picker-wrap label {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
#datePicker {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  color: #fff;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 10px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
  color-scheme: dark;
}
#datePicker:focus { border-color: var(--primary); }
main { padding: 24px 32px 60px; max-width: 1400px; margin: 0 auto; }
.card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(28,41,69,0.06);
  padding: 22px 26px;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Merriweather', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.badge {
  font-family: 'Nunito Sans', sans-serif;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--primary);
  color: var(--navy);
}
.stats-row {
  display: flex;
  gap: 14px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-chip {
  background: var(--light-bg);
  border-radius: 10px;
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  border-top: 3px solid var(--primary);
  min-width: 110px;
}
.stat-chip .val {
  font-size: 22px;
  font-weight: 800;
  color: var(--navy);
}
.stat-chip .lbl {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--offline-dark);
}
#aggChart { width: 100%; height: 180px; display: block; cursor: crosshair; }
.chart-legend {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 10px;
  font-size: 11px;
  color: var(--offline-dark);
  font-weight: 600;
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap svg {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--offline-dark);
}
#agentSearch {
  width: 100%;
  padding: 9px 12px 9px 36px;
  border: 1px solid var(--stroke);
  border-radius: 8px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 13px;
  color: var(--navy-text);
  outline: none;
  transition: border-color 0.2s;
  background: var(--white);
}
#agentSearch:focus { border-color: var(--primary); }
.time-ruler {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-weight: 700;
  color: var(--offline-dark);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding-left: 198px;
  padding-right: 78px;
}
.list-header {
  display: grid;
  grid-template-columns: 196px 1fr 74px;
  gap: 12px;
  padding: 6px 0 8px 0;
  border-bottom: 2px solid var(--navy);
  margin-bottom: 6px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--navy);
}
.agent-list-scroll {
  max-height: 760px;
  overflow-y: auto;
  padding-right: 2px;
}
.agent-list-scroll::-webkit-scrollbar { width: 4px; }
.agent-list-scroll::-webkit-scrollbar-track { background: var(--light-bg); }
.agent-list-scroll::-webkit-scrollbar-thumb { background: var(--stroke); border-radius: 2px; }
.agent-row {
  display: grid;
  grid-template-columns: 196px 1fr 74px;
  align-items: center;
  gap: 12px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(211,219,238,0.5);
}
.agent-row:last-child { border-bottom: none; }
.agent-name { font-size: 12px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-email { font-size: 10px; color: var(--offline-dark); }
.avail-time { font-size: 12px; font-weight: 700; text-align: right; }
.avail-time.has-data { color: var(--success); }
.avail-time.no-data { color: var(--offline-dark); }
#tooltip {
  position: fixed;
  background: var(--navy);
  color: #fff;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  pointer-events: none;
  z-index: 200;
  display: none;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.no-data-row { text-align: center; padding: 28px; color: var(--offline-dark); font-size: 13px; }
</style>
</head>

    <div class="chart-legend">

  <div class="card">

    <div class="time-ruler" id="timeRuler"></div>

  </div>
</main>

  const buckets=new Uint8Array(288);
  let status=sorted[0][2]; // prev of first event
  let ei=0;
  for(let b=0;b<288;b++){
    const bMin=b*5;
    while(ei<sorted.length && sorted[ei][0]<=bMin+4){
      status=sorted[ei][1];
      ei++;
    }
    buckets[b]=status;
  }
  return buckets;
}

function buildAgg(timelines){
  const agg=new Int16Array(288);
  for(const {tl} of timelines){
    if(!tl)continue;
    for(let b=0;b<288;b++)agg[b]+=tl[b];
  }
  return agg;
}

let currentTimelines=[];
let currentAgg=null;

function drawAgg(agg){
  const canvas=document.getElementById('aggChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth;const H=canvas.offsetHeight;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
  const maxV=Math.max(...agg,1);
  const PL=38,PR=8,PT=10,PB=26;
  const cW=W-PL-PR,cH=H-PT-PB;
  const bW=cW/288;
  ctx.clearRect(0,0,W,H);
  // grid
  for(let i=0;i<=4;i++){
    const y=PT+cH-(i/4)*cH;
    ctx.strokeStyle='#EBF0F8';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+cW,y);ctx.stroke();
    ctx.fillStyle='#7B8DAD';ctx.font='600 10px Nunito Sans,sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(i/4*maxV),PL-4,y+3);
  }
  // fill
  const grad=ctx.createLinearGradient(0,PT,0,PT+cH);
  grad.addColorStop(0,'rgba(7,217,118,0.28)');grad.addColorStop(1,'rgba(7,217,118,0.02)');
  ctx.beginPath();ctx.moveTo(PL,PT+cH);
  for(let b=0;b<288;b++){
    const x=PL+b*bW;const y=PT+cH-(agg[b]/maxV)*cH;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(PL+cW,PT+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // line
  ctx.beginPath();ctx.strokeStyle='#07D976';ctx.lineWidth=2;ctx.lineJoin='round';
  for(let b=0;b<288;b++){
    const x=PL+b*bW+bW/2;const y=PT+cH-(agg[b]/maxV)*cH;
    b===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  // x-axis hours
  ctx.fillStyle='#7B8DAD';ctx.font='600 10px Nunito Sans,sans-serif';ctx.textAlign='center';
  for(let h=0;h<=24;h+=3){
    const x=PL+(h*12)*bW;
    ctx.fillText((h<10?'0':'')+h+':00',x,H-4);
    ctx.strokeStyle='#D3DBEE';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,PT+cH);ctx.lineTo(x,PT+cH+4);ctx.stroke();
  }
  canvas._agg=agg;canvas._PL=PL;canvas._bW=bW;canvas._cH=cH;canvas._PT=PT;
}

function renderAgentList(filter){
  const q=(filter||'').toLowerCase();
  const visible=AGENTS.filter(a=>!q||a.name.toLowerCase().includes(q)||a.email.toLowerCase().includes(q));
  document.getElementById('agentCountBadge').textContent=visible.length;
  if(!visible.length){
    document.getElementById('agentList').innerHTML='<div class="no-data-row">No agents match your search.</div>';
    return;
  }
  const rows=visible.map(a=>{
    const entry=currentTimelines.find(t=>t.uid===a.uid);
    const tl=entry?entry.tl:null;
    let barInner='';
    let availMin=0;
    if(tl){
      let segs=[];let seg=null;
      for(let b=0;b<288;b++){
        if(!seg||seg.s!==tl[b]){if(seg)segs.push(seg);seg={s:tl[b],st:b,en:b};}
        else seg.en=b;
        if(tl[b])availMin+=5;
      }
      if(seg)segs.push(seg);
      const svgParts=segs.map(s=>{
        const x=((s.st/288)*100).toFixed(3);
        const w=(((s.en-s.st+1)/288)*100).toFixed(3);
        const fill=s.s?'#07D976':'#E4E9F4';
        return '<rect x="'+x+'%" y="0" width="'+w+'%" height="100%" fill="'+fill+'"/>';
      });
      barInner='<svg viewBox="0 0 1 1" preserveAspectRatio="none" style="display:block;width:100%;height:28px;border-radius:4px" data-uid="'+a.uid+'">'+svgParts.join('')+'</svg>';
    } else {
      barInner='<div style="height:28px;border-radius:4px;background:#EFF1F8;display:flex;align-items:center;justify-content:center"><span style="font-size:10px;color:#7B8DAD;font-weight:600">No data</span></div>';
    }
    const h=Math.floor(availMin/60);const m=availMin%60;
    const availStr=tl?(h>0?h+'h '+(m>0?m+'m':''):(m>0?m+'m':'0m')):'—';
    const cls=tl&&availMin>0?'avail-time has-data':'avail-time no-data';
    return '<div class="agent-row"><div><div class="agent-name">'+a.name+'</div><div class="agent-email">'+a.email+'</div></div><div>'+barInner+'</div><div class="'+cls+'">'+availStr+'</div></div>';
  });
  document.getElementById('agentList').innerHTML=rows.join('');
}

// Time ruler
function buildRuler(){
  const ruler=document.getElementById('timeRuler');
  const hours=[0,3,6,9,12,15,18,21,24];
  ruler.innerHTML=hours.map(h=>'<span>'+(h<10?'0':'')+h+':00</span>').join('');
}

// Tooltip
const tooltip=document.getElementById('tooltip');
document.getElementById('aggChart').addEventListener('mousemove',function(e){
  if(!this._agg)return;
  const rect=this.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const b=Math.round((x-this._PL)/this._bW);
  if(b<0||b>=288){tooltip.style.display='none';return;}
  const count=this._agg[b];
  tooltip.textContent=fmt(b*5)+' – '+fmt(Math.min(b*5+5,1440))+' UTC · '+count+' available';
  tooltip.style.display='block';
  tooltip.style.left=(e.clientX+14)+'px';
  tooltip.style.top=(e.clientY-32)+'px';
});
document.getElementById('aggChart').addEventListener('mouseleave',()=>tooltip.style.display='none');

document.getElementById('agentList').addEventListener('mousemove',function(e){
  const svg=e.target.closest('svg[data-uid]');
  if(!svg){tooltip.style.display='none';return;}
  const uid=svg.dataset.uid;
  const entry=currentTimelines.find(t=>t.uid===uid);
  if(!entry||!entry.tl)return;
  const rect=svg.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const b=Math.min(287,Math.floor((x/rect.width)*288));
  const status=entry.tl[b]?'Available':'Offline';
  const color=entry.tl[b]?'#07D976':'#7B8DAD';
  const agent=AGENTS.find(a=>a.uid===uid);
  tooltip.innerHTML='<span style="color:'+color+'">●</span> '+(agent?agent.name:'?')+' · '+fmt(b*5)+' UTC · '+status;
  tooltip.style.display='block';
  tooltip.style.left=(e.clientX+14)+'px';
  tooltip.style.top=(e.clientY-32)+'px';
});
document.getElementById('agentList').addEventListener('mouseleave',()=>tooltip.style.display='none');

function render(day){
  currentTimelines=AGENTS.map(a=>({uid:a.uid,tl:buildTimeline(a.uid,day)}));
  currentAgg=buildAgg(currentTimelines);

  const hasData=currentTimelines.filter(t=>t.tl);
  const peak=Math.max(...currentAgg);
  const nonZeroBuckets=Array.from(currentAgg).filter(v=>v>0);
  const avg=nonZeroBuckets.length?nonZeroBuckets.reduce((s,v)=>s+v,0)/nonZeroBuckets.length:0;
  const totalMin=currentTimelines.reduce((s,{tl})=>{if(!tl)return s;return s+Array.from(tl).filter(v=>v).length*5;},0);

  document.getElementById('statPeak').textContent=peak;
  document.getElementById('statAvg').textContent=avg.toFixed(1);
  document.getElementById('statActive').textContent=hasData.length;
  document.getElementById('statHours').textContent=(totalMin/60).toFixed(0)+'h';

  const today=new Date().toISOString().slice(0,10);
  document.getElementById('aggBadge').textContent=day===today?'Today':day;

  drawAgg(currentAgg);
  renderAgentList(document.getElementById('agentSearch').value);
}

// Init
buildRuler();
const picker=document.getElementById('datePicker');
const today=new Date().toISOString().slice(0,10);
const minDate=new Date(Date.now()-6*86400000).toISOString().slice(0,10);
picker.max=today;picker.min=minDate;picker.value=today;
picker.addEventListener('change',()=>render(picker.value));
document.getElementById('agentSearch').addEventListener('input',()=>renderAgentList(document.getElementById('agentSearch').value));
window.addEventListener('resize',()=>{if(currentAgg)drawAgg(currentAgg);});
render(today);
</script>
</body>
